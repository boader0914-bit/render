services:
  - type: web
    name: glamping-cluster-app
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: glamping-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: OUTPUTS_DIR
        value: /var/data/outputs
      - key: CONFIG_DIR
        value: /var/data/config
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: NAVER_SEARCHAD_API_KEY
        sync: false
      - key: NAVER_SEARCHAD_SECRET_KEY
        sync: false
      - key: NAVER_SEARCHAD_CUSTOMER_ID
        sync: false
